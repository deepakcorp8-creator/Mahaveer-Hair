    <title>Mahaveer Hair Solution - Management Portal</title>

    <!-- PWA: installable "add to home screen" app -->
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="shortcut icon" href="/icons/icon-192.png">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }

      /* GLOBAL SCALING
         Root font-size drives every rem-based size (text, padding, gaps).
         Fluid formula keeps one consistent scale across phones, laptops and
         high-DPI / OS-scaled Windows displays, instead of jumping at breakpoints.
         ~13.6px @ 390px  ->  ~14px @ 768px  ->  ~14.7px @ 1280px  ->  15.5px cap */
      html {
        font-size: clamp(13px, 0.122vw + 13.1px, 15.5px);
        -webkit-text-size-adjust: 100%; /* stop mobile browsers inflating text */
        text-size-adjust: 100%;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
        overscroll-behavior-y: none; /* Prevents pull-to-refresh bounce */
        /* Make text selection native app like (none) */
        -webkit-user-select: none;
        user-select: none;
      }

      /* INSTALLED APP (home-screen / standalone) — behave like a native app:
         no long-press callouts, no text drag, and keep content clear of the
         notch and the gesture bar. */
      @media (display-mode: standalone) {
        body {
          -webkit-touch-callout: none;
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }

      /* Never let a wide child crop the page sideways */
      html, body {
        max-width: 100%;
        overflow-x: hidden;
      }
      img, svg, video, canvas {
        max-width: 100%;
      }

      /* Allow selection on inputs */
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }

      /* Keep form controls on the same scale as the rest of the UI
         (iOS/Safari otherwise force their own font-size on them) */
      input, select, textarea, button {
        font-family: inherit;
        font-size: inherit;
      }


      /* Stylish Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8; 
        border-radius: 4px;
        border: 2px solid #f1f5f9;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",

  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <!-- PWA: register the service worker (production builds only — in dev it would
         serve stale bundles). This is what makes the app installable and lets it
         open instantly / survive a dropped connection. -->
    <script>
      if ('serviceWorker' in navigator && location.protocol === 'https:') {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('Service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
